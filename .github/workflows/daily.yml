name: Daily arXiv Paper Fetch

# 控制工作流何时运行
on:
  # 允许手动运行工作流（方便测试）
  workflow_dispatch:

  # 定时自动运行（Cron 语法）
  # 每天北京时间 8:00 (UTC+8) 运行
  schedule:
    - cron: '0 0 * * *'

# 环境变量
env:
  OUTPUT_FILE: "altermagnetic_recent_papers.md"

jobs:
  build:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤 2：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤 3：安装依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      # 步骤 4：运行 fetch_papers.py 脚本
      - name: Run fetch script
        run: python fetch_papers.py

      - name: Commit and Push changes
   run: |
     # 1. 配置 Git 用户信息，这是提交代码的必要信息
     git config user.name "github-actions[bot]"
     git config user.email "github-actions[bot]@users.noreply.github.com"
     
     # 2. 执行 git add 命令，将新生成的 Markdown 文件添加到暂存区
     git add altermagnetic_recent_papers.md
     
     # 3. 执行 git commit 命令，提交更改并附带提交信息
     # 为了安全，我们先用 '--dry-run' 检查是否有文件需要提交，避免因无变更而报错
     if git diff --cached --quiet; then
       echo "没有发现新的变更，跳过提交步骤。"
     else
       git commit -m "Automated update: arXiv papers"
       
       # 4. 使用 GitHub Actions 官方维护的推送 Action
       uses: actions/checkout@v4 # 这里是示例，实际应引用上述处理好的内容，比如 ad-m/github-push-action@master
       # ... 并正确指定参数
     fi
